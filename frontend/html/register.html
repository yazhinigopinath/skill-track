<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Skill Track</title>
<link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:480px">
    <div class="auth-logo">
      <h1>⬡ Skill Track</h1>
      <p>Create a new account</p>
    </div>
    <div id="alert-box"></div>
    <form id="reg-form">
      <div class="form-row">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="johndoe" required>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="role_id" required>
            <option value="">Select role…</option>
            <option value="2">Admin</option>
            <option value="3">Trainer</option>
            <option value="4">Student</option>
            <option value="5">Marketer</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@skilltrack.com" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 8 characters" required minlength="8">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm_password" placeholder="Re-enter password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-full" id="reg-btn" style="margin-top:4px;padding:11px">
        Create Account
      </button>
    </form>
    <p class="text-center text-muted fs-12 mt-16">
      Already have an account? <a href="login.html" class="text-accent">Sign In</a>
    </p>
  </div>
</div>
<script src="../js/app.js"></script>
<script>
  document.getElementById('reg-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pwd  = document.getElementById('password').value;
    const conf = document.getElementById('confirm_password').value;
    if (pwd !== conf) return showAlert('Passwords do not match.');
    const btn = document.getElementById('reg-btn');
    btn.innerHTML = '<span class="spinner"></span> Creating…';
    btn.disabled = true;
    try {
      await api.post('/auth/register', {
        username: document.getElementById('username').value,
        email:    document.getElementById('email').value,
        password: pwd,
        role_id:  +document.getElementById('role_id').value,
      });
      document.getElementById('alert-box').innerHTML =
        '<div class="alert alert-success">✓ Account created! <a href="login.html" class="text-accent">Sign in now</a></div>';
      document.getElementById('reg-form').reset();
    } catch (err) {
      showAlert(err.message || 'Registration failed.');
    }
    btn.innerHTML = 'Create Account';
    btn.disabled = false;
  });
  function showAlert(msg) {
    document.getElementById('alert-box').innerHTML = `<div class="alert alert-danger">⚠ ${msg}</div>`;
  }
</script>
</body>
</html>
