<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs — Skill Track</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-shell" id="app-shell">
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">Jobs & Placement</span>
        <span class="breadcrumb">Placement / Jobs</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openModal('add-job-modal')">+ Post Job</button>
      </div>
    </div>

    <div class="page-content">
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search jobs…">
        </div>
        <select id="type-filter" style="width:150px">
          <option value="">All Types</option>
          <option>Full-time</option><option>Part-time</option>
          <option>Internship</option><option>Contract</option>
        </select>
      </div>

      <div id="jobs-grid" class="grid-2">
        <div class="text-muted text-center" style="grid-column:span 2;padding:40px"><span class="spinner"></span></div>
      </div>
    </div>
  </div>
</div>

<!-- Post Job Modal -->
<div class="modal-backdrop" id="add-job-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Post New Job</h3>
      <button class="btn btn-icon btn-outline" onclick="closeModal('add-job-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="job-alert"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Job Title *</label>
          <input type="text" id="j-title" required placeholder="Junior Python Developer">
        </div>
        <div class="form-group">
          <label>Company *</label>
          <input type="text" id="j-company" required placeholder="TechCorp Solutions">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="j-location" placeholder="Chennai / Remote">
        </div>
        <div class="form-group">
          <label>Job Type</label>
          <select id="j-type">
            <option>Full-time</option><option>Part-time</option>
            <option>Internship</option><option>Contract</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Salary Range</label>
          <input type="text" id="j-salary" placeholder="3–5 LPA or 15000/month">
        </div>
        <div class="form-group">
          <label>Application Deadline</label>
          <input type="date" id="j-deadline">
        </div>
      </div>
      <div class="form-group">
        <label>Job Description</label>
        <textarea id="j-desc" rows="3" placeholder="Role responsibilities and expectations…"></textarea>
      </div>
      <div class="form-group">
        <label>Requirements</label>
        <textarea id="j-req" rows="2" placeholder="Skills and qualifications needed…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('add-job-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveJob()">Post Job</button>
    </div>
  </div>
</div>

<!-- Job Detail / Apply Modal -->
<div class="modal-backdrop" id="job-detail-modal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h3 id="jd-title">Job Detail</h3>
      <button class="btn btn-icon btn-outline" onclick="closeModal('job-detail-modal')">✕</button>
    </div>
    <div class="modal-body" id="jd-body">Loading…</div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('job-detail-modal')">Close</button>
      <button class="btn btn-primary" id="apply-btn" onclick="applyJob()">Apply Now</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/app.js"></script>
<script>
  initPage('Jobs');
  let allJobs = [], currentJobId = null;

  async function loadJobs() {
    try {
      allJobs = await api.get('/jobs/');
      renderJobs(allJobs);
    } catch(e) {
      document.getElementById('jobs-grid').innerHTML =
        '<div class="text-muted text-center" style="grid-column:span 2;padding:40px">Failed to load jobs</div>';
    }
  }

  function renderJobs(data) {
    const grid = document.getElementById('jobs-grid');
    if (!data.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:span 2"><div class="empty-icon">💼</div><h3>No Jobs</h3><p>No active job postings yet</p></div>';
      return;
    }
    const typeBadge = t => {
      const m = {'Full-time':'green','Part-time':'yellow','Internship':'blue','Contract':'purple'};
      return `<span class="badge badge-${m[t]||'gray'}">${t}</span>`;
    };
    grid.innerHTML = data.map(j => `
      <div class="card" style="cursor:pointer" onclick="viewJob(${j.id})">
        <div class="flex-between mb-12">
          <div>
            <div class="fw-700" style="font-size:15px">${j.title}</div>
            <div class="text-muted fs-12 mt-4">${j.company} • ${j.location||'Location TBD'}</div>
          </div>
          ${typeBadge(j.job_type)}
        </div>
        <div class="text-muted fs-13" style="margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">
          ${j.description||'No description provided.'}
        </div>
        <div class="flex gap-12 text-muted fs-12">
          ${j.salary_range ? `<span>💰 ${j.salary_range}</span>` : ''}
          ${j.deadline ? `<span>📅 Deadline: ${fmtDate(j.deadline)}</span>` : ''}
        </div>
        <div class="flex gap-8 mt-12">
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();viewJob(${j.id})">View & Apply</button>
          <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();viewApplications(${j.id})">Applications</button>
        </div>
      </div>`).join('');
  }

  async function viewJob(id) {
    currentJobId = id;
    document.getElementById('jd-body').innerHTML = '<div class="text-center"><span class="spinner"></span></div>';
    openModal('job-detail-modal');
    const j = allJobs.find(x => x.id === id) || {};
    document.getElementById('jd-title').textContent = j.title;
    document.getElementById('jd-body').innerHTML = `
      <div class="grid-2 mb-16">
        <div><div class="text-muted fs-12 mono mb-4">COMPANY</div><div class="fw-600">${j.company||'—'}</div></div>
        <div><div class="text-muted fs-12 mono mb-4">LOCATION</div><div>${j.location||'—'}</div></div>
        <div><div class="text-muted fs-12 mono mb-4">TYPE</div><div>${j.job_type}</div></div>
        <div><div class="text-muted fs-12 mono mb-4">SALARY</div><div>${j.salary_range||'Not disclosed'}</div></div>
      </div>
      <div class="mb-16">
        <div class="text-muted fs-12 mono mb-4">DESCRIPTION</div>
        <div style="line-height:1.7">${j.description||'—'}</div>
      </div>
      ${j.requirements ? `<div class="mb-16"><div class="text-muted fs-12 mono mb-4">REQUIREMENTS</div><div style="line-height:1.7">${j.requirements}</div></div>` : ''}
      ${j.deadline ? `<div><div class="text-muted fs-12 mono mb-4">APPLICATION DEADLINE</div><div>${fmtDate(j.deadline)}</div></div>` : ''}`;
  }

  async function applyJob() {
    const user = Auth.getUser();
    // In a real system, look up student ID from user ID
    try {
      await api.post(`/jobs/${currentJobId}/apply`, { student_id: 1 }); // demo
      toast('Application submitted!', 'success');
      closeModal('job-detail-modal');
    } catch(e) { toast(e.message, 'error'); }
  }

  async function viewApplications(jobId) {
    try {
      const apps = await api.get(`/jobs/${jobId}/applications`);
      const j = allJobs.find(x => x.id === jobId);
      currentJobId = jobId;
      document.getElementById('jd-title').textContent = `Applications — ${j?.title}`;
      document.getElementById('apply-btn').style.display = 'none';
      document.getElementById('jd-body').innerHTML = `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Student ID</th><th>Name</th><th>Applied</th><th>Status</th></tr></thead>
            <tbody>${apps.map(a=>`
              <tr>
                <td class="mono text-accent">${a.student_id}</td>
                <td>${a.full_name}</td>
                <td class="text-muted">${fmtDate(a.applied_at)}</td>
                <td>${statusBadge(a.status)}</td>
              </tr>`).join('')||'<tr><td colspan="4" class="text-center text-muted" style="padding:16px">No applications yet</td></tr>'}
            </tbody>
          </table>
        </div>`;
      openModal('job-detail-modal');
    } catch(e) { toast(e.message, 'error'); }
  }

  async function saveJob() {
    try {
      await api.post('/jobs/', {
        title: document.getElementById('j-title').value,
        company: document.getElementById('j-company').value,
        location: document.getElementById('j-location').value,
        job_type: document.getElementById('j-type').value,
        salary_range: document.getElementById('j-salary').value,
        deadline: document.getElementById('j-deadline').value,
        description: document.getElementById('j-desc').value,
        requirements: document.getElementById('j-req').value,
      });
      toast('Job posted!', 'success');
      closeModal('add-job-modal');
      loadJobs();
    } catch(e) {
      document.getElementById('job-alert').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
    }
  }

  document.getElementById('search-input').addEventListener('input', () => {
    const q = document.getElementById('search-input').value.toLowerCase();
    const type = document.getElementById('type-filter').value;
    renderJobs(allJobs.filter(j =>
      (!q || (j.title+j.company+j.location).toLowerCase().includes(q)) &&
      (!type || j.job_type === type)
    ));
  });
  document.getElementById('type-filter').addEventListener('change', () =>
    document.getElementById('search-input').dispatchEvent(new Event('input'))
  );

  loadJobs();
</script>
</body>
</html>
