<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainers — Skill Track</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-shell" id="app-shell">
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">Trainers</span>
        <span class="breadcrumb">Admin / Trainers</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openModal('add-trainer-modal')">+ Add Trainer</button>
      </div>
    </div>
    <div class="page-content">
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search trainers…">
        </div>
      </div>
      <div id="trainers-grid" class="grid-3">
        <div class="text-muted text-center" style="grid-column:span 3;padding:40px"><span class="spinner"></span></div>
      </div>
    </div>
  </div>
</div>

<!-- Add Trainer Modal -->
<div class="modal-backdrop" id="add-trainer-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Trainer</h3>
      <button class="btn btn-icon btn-outline" onclick="closeModal('add-trainer-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="tr-alert"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="tr-name" required placeholder="Arjun Sharma">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="tr-email" required placeholder="arjun@skilltrack.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="tr-phone" placeholder="9876543210">
        </div>
        <div class="form-group">
          <label>Experience (years)</label>
          <input type="number" id="tr-exp" min="0" value="0">
        </div>
      </div>
      <div class="form-group">
        <label>Specialization</label>
        <input type="text" id="tr-spec" placeholder="Python, Django, Machine Learning…">
      </div>
      <div class="form-group">
        <label>Joined Date</label>
        <input type="date" id="tr-date">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('add-trainer-modal')">Cancel</button>
      <button class="btn btn-primary" id="save-trainer-btn" onclick="saveTrainer()">Add Trainer</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/app.js"></script>
<script>
  initPage('Trainers');
  let allTrainers = [];

  async function loadTrainers() {
    try {
      allTrainers = await api.get('/trainers/');
      renderTrainers(allTrainers);
    } catch(e) {
      document.getElementById('trainers-grid').innerHTML =
        '<div class="text-muted text-center" style="grid-column:span 3;padding:40px">Failed to load trainers</div>';
    }
  }

  function renderTrainers(data) {
    const grid = document.getElementById('trainers-grid');
    if (!data.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:span 3">
        <div class="empty-icon">🎓</div><h3>No Trainers</h3>
        <p>Add your first trainer to get started</p>
      </div>`;
      return;
    }
    const gradients = [
      'linear-gradient(135deg,#4f8ef7,#7c3aed)',
      'linear-gradient(135deg,#22c55e,#16a34a)',
      'linear-gradient(135deg,#f59e0b,#d97706)',
      'linear-gradient(135deg,#ef4444,#dc2626)',
      'linear-gradient(135deg,#8b5cf6,#7c3aed)',
      'linear-gradient(135deg,#06b6d4,#0891b2)',
    ];
    grid.innerHTML = data.map((t, i) => {
      const specs = (t.specialization || '').split(',').slice(0,3).map(s => s.trim()).filter(Boolean);
      return `
      <div class="card">
        <div class="flex gap-12 mb-16" style="align-items:center">
          <div style="
            width:52px;height:52px;border-radius:50%;
            background:${gradients[i % gradients.length]};
            display:flex;align-items:center;justify-content:center;
            font-weight:800;font-size:20px;flex-shrink:0;color:#fff">
            ${t.full_name[0].toUpperCase()}
          </div>
          <div style="flex:1;min-width:0">
            <div class="fw-700" style="font-size:15px">${t.full_name}</div>
            <div class="text-muted fs-12 mt-2">${t.email}</div>
          </div>
          ${statusBadge(t.status)}
        </div>

        ${specs.length ? `<div class="flex gap-6 flex-wrap mb-12">
          ${specs.map(s => `<span class="badge badge-blue">${s}</span>`).join('')}
        </div>` : ''}

        <div class="grid-2 mb-12" style="gap:8px">
          <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:8px 10px">
            <div class="text-muted fs-11 mono">EXPERIENCE</div>
            <div class="fw-600">${t.experience_years || 0} yrs</div>
          </div>
          <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:8px 10px">
            <div class="text-muted fs-11 mono">JOINED</div>
            <div class="fw-600">${t.joined_date ? new Date(t.joined_date).getFullYear() : '—'}</div>
          </div>
        </div>

        ${t.phone ? `<div class="text-muted fs-12 mb-12">📞 ${t.phone}</div>` : ''}

        <div class="flex gap-8">
          <a href="batches.html" class="btn btn-outline btn-sm">View Batches</a>
          <button class="btn btn-outline btn-sm" onclick="deactivateTrainer(${t.id}, '${t.status}')">
            ${t.status === 'Active' ? 'Deactivate' : 'Activate'}
          </button>
        </div>
      </div>`;
    }).join('');
  }

  async function saveTrainer() {
    const btn = document.getElementById('save-trainer-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    try {
      await api.post('/trainers/', {
        full_name: document.getElementById('tr-name').value,
        email: document.getElementById('tr-email').value,
        phone: document.getElementById('tr-phone').value,
        experience_years: parseInt(document.getElementById('tr-exp').value) || 0,
        specialization: document.getElementById('tr-spec').value,
        joined_date: document.getElementById('tr-date').value,
      });
      toast('Trainer added successfully', 'success');
      closeModal('add-trainer-modal');
      loadTrainers();
    } catch(e) {
      document.getElementById('tr-alert').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
    } finally {
      btn.disabled = false; btn.innerHTML = 'Add Trainer';
    }
  }

  async function deactivateTrainer(id, currentStatus) {
    // Placeholder — would call PUT /api/trainers/:id with toggled status
    toast('Status update coming soon', 'info');
  }

  document.getElementById('search-input').addEventListener('input', () => {
    const q = document.getElementById('search-input').value.toLowerCase();
    renderTrainers(q ? allTrainers.filter(t =>
      (t.full_name + t.email + (t.specialization||'')).toLowerCase().includes(q)
    ) : allTrainers);
  });

  loadTrainers();
</script>
</body>
</html>
