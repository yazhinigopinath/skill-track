<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students — Skill Track</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-shell" id="app-shell">
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title">Students</span>
        <span class="breadcrumb">Admin / Students</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openModal('add-student-modal')">+ Add Student</button>
      </div>
    </div>

    <div class="page-content">
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search students…">
        </div>
        <select id="status-filter" style="width:140px">
          <option value="">All Status</option>
          <option>Active</option><option>Inactive</option>
          <option>Completed</option><option>Dropped</option>
        </select>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table id="students-table">
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Qualification</th>
                <th>Enrolled</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="students-tbody">
              <tr><td colspan="8" class="text-center text-muted" style="padding:40px">
                <span class="spinner"></span>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Student Modal -->
<div class="modal-backdrop" id="add-student-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add New Student</h3>
      <button class="btn btn-icon btn-outline" onclick="closeModal('add-student-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="add-alert"></div>
      <form id="add-student-form">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="s-name" required placeholder="e.g. Priya Patel">
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="s-email" required placeholder="priya@email.com">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="s-phone" placeholder="9xxxxxxxxx">
          </div>
          <div class="form-group">
            <label>Gender</label>
            <select id="s-gender">
              <option value="">Select</option>
              <option>Male</option><option>Female</option><option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="s-dob">
          </div>
          <div class="form-group">
            <label>Qualification</label>
            <input type="text" id="s-qual" placeholder="B.Tech, BCA, etc.">
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea id="s-address" rows="2" placeholder="Full address"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('add-student-modal')">Cancel</button>
      <button class="btn btn-primary" id="save-student-btn" onclick="saveStudent()">Save Student</button>
    </div>
  </div>
</div>

<!-- View/Edit Student Modal -->
<div class="modal-backdrop" id="edit-student-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Edit Student <span class="mono text-accent" id="edit-sid"></span></h3>
      <button class="btn btn-icon btn-outline" onclick="closeModal('edit-student-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="edit-alert"></div>
      <form id="edit-student-form">
        <input type="hidden" id="edit-id">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="e-name">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="e-phone">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Qualification</label>
            <input type="text" id="e-qual">
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="e-status">
              <option>Active</option><option>Inactive</option>
              <option>Completed</option><option>Dropped</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea id="e-address" rows="2"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('edit-student-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="updateStudent()">Update</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/app.js"></script>
<script>
  initPage('Students');
  let allStudents = [];

  async function loadStudents() {
    try {
      allStudents = await api.get('/students/');
      renderTable(allStudents);
    } catch(e) {
      document.getElementById('students-tbody').innerHTML =
        '<tr><td colspan="8" class="text-center text-muted" style="padding:40px">Failed to load. Is backend running?</td></tr>';
    }
  }

  function renderTable(data) {
    const tbody = document.getElementById('students-tbody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">👥</div><h3>No Students</h3><p>Add your first student to get started</p></div></td></tr>';
      return;
    }
    tbody.innerHTML = data.map(s => `
      <tr>
        <td class="mono text-accent">${s.student_id}</td>
        <td class="fw-600">${s.full_name}</td>
        <td class="text-muted">${s.email}</td>
        <td class="text-muted">${s.phone||'—'}</td>
        <td>${s.qualification||'—'}</td>
        <td class="text-muted">${fmtDate(s.enrolled_date)}</td>
        <td>${statusBadge(s.status)}</td>
        <td>
          <div class="flex gap-8">
            <button class="btn btn-outline btn-sm" onclick="editStudent(${s.id})">Edit</button>
            <a href="attendance.html?student=${s.id}" class="btn btn-outline btn-sm">Attendance</a>
          </div>
        </td>
      </tr>`).join('');
  }

  async function saveStudent() {
    const btn = document.getElementById('save-student-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    try {
      await api.post('/students/', {
        full_name: document.getElementById('s-name').value,
        email: document.getElementById('s-email').value,
        phone: document.getElementById('s-phone').value,
        gender: document.getElementById('s-gender').value,
        dob: document.getElementById('s-dob').value,
        qualification: document.getElementById('s-qual').value,
        address: document.getElementById('s-address').value,
      });
      toast('Student added successfully', 'success');
      closeModal('add-student-modal');
      document.getElementById('add-student-form').reset();
      loadStudents();
    } catch(e) {
      document.getElementById('add-alert').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
    } finally {
      btn.disabled = false; btn.innerHTML = 'Save Student';
    }
  }

  function editStudent(id) {
    const s = allStudents.find(x => x.id === id);
    if (!s) return;
    document.getElementById('edit-id').value = s.id;
    document.getElementById('edit-sid').textContent = s.student_id;
    document.getElementById('e-name').value = s.full_name;
    document.getElementById('e-phone').value = s.phone||'';
    document.getElementById('e-qual').value = s.qualification||'';
    document.getElementById('e-status').value = s.status;
    document.getElementById('e-address').value = s.address||'';
    openModal('edit-student-modal');
  }

  async function updateStudent() {
    const id = document.getElementById('edit-id').value;
    try {
      await api.put(`/students/${id}`, {
        full_name: document.getElementById('e-name').value,
        phone: document.getElementById('e-phone').value,
        qualification: document.getElementById('e-qual').value,
        status: document.getElementById('e-status').value,
        address: document.getElementById('e-address').value,
      });
      toast('Student updated', 'success');
      closeModal('edit-student-modal');
      loadStudents();
    } catch(e) {
      document.getElementById('edit-alert').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
    }
  }

  // Filters
  document.getElementById('search-input').addEventListener('input', applyFilters);
  document.getElementById('status-filter').addEventListener('change', applyFilters);

  function applyFilters() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const status = document.getElementById('status-filter').value;
    renderTable(allStudents.filter(s =>
      (!q || (s.full_name+s.email+s.student_id).toLowerCase().includes(q)) &&
      (!status || s.status === status)
    ));
  }

  loadStudents();
</script>
</body>
</html>
