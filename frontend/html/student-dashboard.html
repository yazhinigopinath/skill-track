<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard — Skill Track</title>
<link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="app-shell" id="app-shell">
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">My Dashboard</div>
        <span class="breadcrumb">/ student portal</span>
      </div>
      <div class="topbar-right">
        <span class="mono fs-12 text-muted" id="current-date"></span>
      </div>
    </div>
    <div class="page-content">

      <!-- Profile Hero -->
      <div class="card mb-20" style="background:linear-gradient(135deg,rgba(79,142,247,0.08),rgba(124,58,237,0.06));border-color:rgba(79,142,247,0.2)">
        <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
          <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;flex-shrink:0" id="profile-avatar">?</div>
          <div>
            <h2 id="profile-name">Student</h2>
            <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px">
              <span class="mono fs-12 text-accent" id="profile-id">—</span>
              <span class="badge badge-green" id="profile-status">Active</span>
            </div>
          </div>
          <div style="margin-left:auto;display:flex;gap:8px">
            <a href="jobs.html" class="btn btn-outline btn-sm">💼 Browse Jobs</a>
            <a href="projects.html" class="btn btn-primary btn-sm">📁 My Tasks</a>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card green"><div class="stat-icon">✅</div><div class="stat-value" id="s-present">—</div><div class="stat-label">Days Present</div></div>
        <div class="stat-card yellow"><div class="stat-icon">📋</div><div class="stat-value" id="s-tasks">—</div><div class="stat-label">Pending Tasks</div></div>
        <div class="stat-card blue"><div class="stat-icon">📝</div><div class="stat-value" id="s-assessments">—</div><div class="stat-label">Assessments</div></div>
        <div class="stat-card purple"><div class="stat-icon">💼</div><div class="stat-value" id="s-jobs">—</div><div class="stat-label">Open Jobs</div></div>
      </div>

      <div class="grid-2" style="gap:20px">
        <!-- Attendance -->
        <div class="card">
          <div class="card-header"><div class="card-title">Attendance Summary</div></div>
          <div id="attendance-summary" style="padding:8px 0">
            <div class="text-center text-muted" style="padding:24px">Loading…</div>
          </div>
        </div>

        <!-- Jobs -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">Latest Jobs</div>
            <a href="jobs.html" class="btn btn-outline btn-sm">All Jobs</a>
          </div>
          <div id="latest-jobs">
            <div class="text-center text-muted" style="padding:24px">Loading…</div>
          </div>
        </div>
      </div>

      <!-- Projects -->
      <div class="card mt-20">
        <div class="card-header">
          <div class="card-title">My Tasks</div>
          <a href="projects.html" class="btn btn-outline btn-sm">View All</a>
        </div>
        <div id="my-tasks"><div class="text-center text-muted" style="padding:24px">Loading…</div></div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../js/app.js"></script>
<script>
  initPage('Dashboard');
  document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const user = Auth.getUser();

  async function loadStudentDash() {
    try {
      const [jobs, assessments, projects] = await Promise.all([
        api.get('/jobs/'),
        api.get('/assessments/'),
        api.get('/projects/'),
      ]);

      document.getElementById('s-jobs').textContent = jobs.length;
      document.getElementById('s-assessments').textContent = assessments.length;

      // Count tasks from projects
      let taskCount = 0;
      projects.forEach(p => taskCount += (p.task_count||0));
      document.getElementById('s-tasks').textContent = taskCount;

      // Latest Jobs
      const jobEl = document.getElementById('latest-jobs');
      jobEl.innerHTML = jobs.slice(0,4).map(j=>`
        <div style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div class="flex-between">
            <div class="fw-600 fs-13">${j.title}</div>
            <span class="badge badge-blue">${j.job_type}</span>
          </div>
          <div class="text-muted fs-12 mt-4">${j.company||'—'} · ${j.location||'—'}</div>
          <div class="text-muted mono fs-12">${j.salary_range||'Not disclosed'}</div>
        </div>`).join('') || '<div class="text-center text-muted" style="padding:24px">No jobs posted</div>';

      // Projects/Tasks
      const projEl = document.getElementById('my-tasks');
      projEl.innerHTML = projects.slice(0,5).map(p=>`
        <div style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div class="flex-between">
            <div class="fw-600 fs-13">${p.title}</div>
            <div class="mono fs-12 text-muted">Deadline: ${fmtDate(p.deadline)}</div>
          </div>
          <div class="text-muted fs-12">${p.batch_name||'—'} · ${p.task_count||0} tasks</div>
        </div>`).join('') || '<div class="text-center text-muted" style="padding:24px">No active projects</div>';

    } catch(e) { toast(e.message,'error'); }
  }

  // Attendance summary (generic since we don't know student DB id from JWT here)
  document.getElementById('attendance-summary').innerHTML = `
    <div style="text-align:center;padding:16px">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
        <div><div style="font-size:1.6rem;font-weight:800;color:var(--success)">—</div><div class="mono fs-12 text-muted">Present</div></div>
        <div><div style="font-size:1.6rem;font-weight:800;color:var(--danger)">—</div><div class="mono fs-12 text-muted">Absent</div></div>
        <div><div style="font-size:1.6rem;font-weight:800;color:var(--accent)">—</div><div class="mono fs-12 text-muted">Percentage</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
      <p class="text-muted fs-12 mt-8">Log in to see detailed attendance</p>
    </div>`;

  document.getElementById('s-present').textContent = '—';
  loadStudentDash();
</script>
</body>
</html>
