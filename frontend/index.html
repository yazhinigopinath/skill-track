<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Skill Track</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>⬡ Skill Track</h1>
      <p>Training Institute Management System</p>
    </div>

    <div id="alert-box"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@skilltrack.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-full" id="login-btn" style="margin-top:8px;padding:11px;">
        Sign In
      </button>
    </form>

    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
      <p class="text-muted fs-12 text-center mb-16">Demo Credentials</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="fillDemo('admin@skilltrack.com','Admin@123')">Admin</button>
        <button class="btn btn-outline btn-sm" onclick="fillDemo('trainer@skilltrack.com','Trainer@123')">Trainer</button>
        <button class="btn btn-outline btn-sm" onclick="fillDemo('student@skilltrack.com','Student@123')">Student</button>
        <button class="btn btn-outline btn-sm" onclick="fillDemo('marketer@skilltrack.com','Marketer@123')">Marketer</button>
      </div>
    </div>

    <p class="text-center text-muted fs-12 mt-16">
      Don't have an account? <a href="register.html" class="text-accent">Register</a>
    </p>
  </div>
</div>

<script src="/frontend/js/app.js"></script>
<script>
  if (typeof Auth === "undefined") {
  alert("app.js not loaded");
}
document.getElementById('login-form').addEventListener('submit', (e) => {
  e.preventDefault();
  alert("Button working");
});
window.addEventListener('DOMContentLoaded', () => {

  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    const role = Auth.getUser()?.role;
    redirectByRole(role);
  }

  function redirectByRole(role) {
    const map = {
      admin: '/frontend/html/admin-dashboard.html',
      super_admin: '/frontend/html/admin-dashboard.html',
      trainer: '/frontend/html/trainer-dashboard.html',
      student: '/frontend/html/student-dashboard.html',
      marketer: '/frontend/html/marketer-dashboard.html',
    };
    window.location.href = map[role] || '/frontend/html/admin-dashboard.html';
  }

  function fillDemo(email, pw) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = pw;
  }

  function showAlert(msg, type = 'danger') {
    document.getElementById('alert-box').innerHTML =
      <div class="alert alert-${type}">${msg}</div>;
  }

  // 🔥 DEMO LOGIN
  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();

    const btn = document.getElementById('login-btn');
    btn.innerHTML = '<span class="spinner"></span> Signing in…';
    btn.disabled = true;

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const users = {
      "admin@skilltrack.com": { password: "Admin@123", role: "admin" },
      "trainer@skilltrack.com": { password: "Trainer@123", role: "trainer" },
      "student@skilltrack.com": { password: "Student@123", role: "student" },
      "marketer@skilltrack.com": { password: "Marketer@123", role: "marketer" }
    };

    if (users[email] && users[email].password === password) {
      Auth.setSession("demo-token", {
        email: email,
        role: users[email].role,
        username: email.split("@")[0]
      });

      toast('Login successful!', 'success');

      setTimeout(() => {
        redirectByRole(users[email].role);
      }, 500);

    } else {
      showAlert("Invalid credentials");
      btn.innerHTML = 'Sign In';
      btn.disabled = false;
    }
  });

});
</script>
</body>
</html>
